<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Boobook — Sovereign Australian Maritime Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

:root{
  --void:#030d16;--deep:#061523;--hull:#0b1e32;--panel:#0f2640;--rail:#1c3a56;
  --muted:#4d7090;--ghost:#7da0b8;--text:#c5dce8;--bright:#eaf4fb;
  --signal:#00c9b0;--signal2:#00a896;--warn:#ff6535;--amber:#f5a623;
  --clear:#22c55e;--r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--void);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;line-height:1.6;overflow-x:hidden}

/* ── Nav ── */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(3,13,22,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);padding:0 32px;height:56px;display:flex;align-items:center;gap:0}
.nav-logo{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--signal);letter-spacing:3px;margin-right:40px}
.nav-links{display:flex;gap:2px;flex:1}
.nav-links a{color:var(--muted);text-decoration:none;font-size:13px;padding:6px 14px;border-radius:4px;transition:color .15s,background .15s;letter-spacing:.3px}
.nav-links a:hover{color:var(--bright);background:rgba(255,255,255,.05)}
.nav-cta{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1.5px;padding:8px 18px;border:1px solid var(--signal);color:var(--signal);border-radius:4px;text-decoration:none;transition:background .15s}
.nav-cta:hover{background:rgba(0,201,176,.1)}

/* ── Hero ── */
#hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:100px 64px 80px;position:relative;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;max-width:1200px;margin:0 auto;width:100%}
.hero-eyebrow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--signal);text-transform:uppercase;margin-bottom:20px}
.hero-title{font-size:clamp(36px,5vw,64px);font-weight:700;line-height:1.1;color:var(--bright);margin-bottom:24px}
.hero-title em{font-style:normal;color:var(--signal)}
.hero-sub{font-size:17px;color:var(--ghost);line-height:1.7;max-width:480px;margin-bottom:40px}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap}
.btn-primary{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1.5px;padding:14px 28px;background:var(--signal);color:var(--void);border:none;border-radius:4px;cursor:pointer;text-decoration:none;transition:opacity .15s;font-weight:700}
.btn-primary:hover{opacity:.88}
.btn-ghost{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1.5px;padding:14px 28px;border:1px solid rgba(255,255,255,.15);color:var(--text);border-radius:4px;cursor:pointer;text-decoration:none;transition:border-color .15s,color .15s}
.btn-ghost:hover{border-color:var(--signal);color:var(--signal)}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.stat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);padding:20px}
.stat-val{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--signal);line-height:1;margin-bottom:6px}
.stat-label{font-size:12px;color:var(--muted);line-height:1.4}

/* ── Map section ── */
#map-section{padding:80px 64px;background:var(--deep)}
.section-tag{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--signal);text-transform:uppercase;margin-bottom:14px}
.section-title{font-size:clamp(24px,3vw,38px);font-weight:700;color:var(--bright);margin-bottom:12px;line-height:1.2}
.section-sub{font-size:15px;color:var(--ghost);max-width:640px;margin-bottom:40px;line-height:1.7}
#map{height:520px;border-radius:12px;border:1px solid var(--rail);overflow:hidden}
.map-legend{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ghost)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── How it works ── */
#how{padding:80px 64px;max-width:1200px;margin:0 auto}
.steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:40px}
.step-card{background:var(--hull);border:1px solid var(--rail);border-radius:12px;padding:24px;position:relative;overflow:hidden}
.step-card::before{content:attr(data-n);font-family:'Space Mono',monospace;font-size:48px;font-weight:700;color:rgba(0,201,176,.06);position:absolute;top:12px;right:16px;line-height:1}
.step-icon{width:36px;height:36px;background:rgba(0,201,176,.1);border:1px solid rgba(0,201,176,.2);border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:18px}
.step-title{font-size:14px;font-weight:600;color:var(--bright);margin-bottom:8px}
.step-body{font-size:12px;color:var(--ghost);line-height:1.6}
.step-tech{margin-top:12px;font-family:'Space Mono',monospace;font-size:10px;color:var(--signal);letter-spacing:.5px}

/* ── Dashboard demo ── */
#demo{padding:80px 64px;background:var(--deep)}
.demo-wrap{background:var(--hull);border:1px solid var(--rail);border-radius:16px;overflow:hidden;margin-top:40px}
.demo-topbar{background:var(--deep);padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--rail)}
.demo-dot{width:10px;height:10px;border-radius:50%}
.demo-title{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-left:8px;letter-spacing:.5px}
.demo-grid{display:grid;grid-template-columns:260px 1fr 300px;min-height:500px}
.demo-panel{padding:16px;border-right:1px solid var(--rail)}
.demo-panel:last-child{border-right:none}
.panel-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.kpi-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.kpi-mini{background:var(--panel);border-radius:6px;padding:10px}
.kpi-mini-val{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--signal);line-height:1;margin-bottom:2px}
.kpi-mini-val.warn{color:var(--warn)}
.kpi-mini-label{font-size:10px;color:var(--muted)}
.alert-mini{background:var(--panel);border:1px solid var(--rail);border-radius:6px;padding:10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.alert-mini:hover{border-color:var(--signal)}
.alert-mini.active-alert{border-color:var(--signal);background:rgba(0,201,176,.06)}
.alert-mini-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.sev-pip{font-size:9px;font-family:'Space Mono',monospace;padding:2px 6px;border-radius:2px;letter-spacing:.5px}
.H{background:rgba(255,101,53,.12);color:var(--warn)}
.M{background:rgba(245,166,35,.1);color:var(--amber)}
.L{background:rgba(34,197,94,.08);color:var(--clear)}
.alert-mini-title{font-size:12px;font-weight:600;color:var(--bright)}
.alert-mini-vessel{font-size:11px;color:var(--muted)}
#demo-map{height:100%;min-height:500px}
.detail-pane{overflow-y:auto}
.detail-empty{color:var(--muted);font-size:12px;padding:20px 0;text-align:center}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:11px;gap:8px}
.detail-row:last-child{border-bottom:none}
.dk{color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;flex-shrink:0}
.dv{color:var(--bright);text-align:right;font-size:11px}
.detail-explain{font-size:11px;color:var(--ghost);line-height:1.6;margin:10px 0;padding:10px;background:var(--panel);border-radius:6px;border-left:2px solid var(--signal)}
.detail-action{font-size:11px;color:var(--amber);line-height:1.6;padding:10px;background:var(--panel);border-radius:6px;border-left:2px solid var(--amber)}

/* ── Tech deep-dive ── */
#tech{padding:80px 64px;max-width:1200px;margin:0 auto}
.tech-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:40px}
.tech-block{border-left:2px solid var(--rail);padding-left:24px}
.tech-block-title{font-size:16px;font-weight:600;color:var(--bright);margin-bottom:10px}
.tech-block-sub{font-size:13px;color:var(--ghost);line-height:1.7;margin-bottom:16px}
.tech-tag{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid var(--rail);color:var(--muted);margin:2px}
.limitations-box{background:rgba(245,166,35,.04);border:1px solid rgba(245,166,35,.15);border-radius:var(--r);padding:20px;margin-top:32px}
.limitations-title{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--amber);margin-bottom:12px}
.limitation-item{font-size:12px;color:var(--ghost);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.5;display:flex;gap:10px}
.limitation-item:last-child{border-bottom:none;padding-bottom:0}
.limitation-item::before{content:'→';color:var(--amber);flex-shrink:0}

/* ── Market ── */
#market{padding:80px 64px;background:var(--deep)}
.tam-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:40px;max-width:1200px;margin-left:auto;margin-right:auto}
.tam-card{background:var(--hull);border:1px solid var(--rail);border-radius:12px;padding:24px}
.tam-tier-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.tam-val{font-size:32px;font-weight:700;margin-bottom:8px;line-height:1}
.tam-desc{font-size:12px;color:var(--ghost);line-height:1.6;margin-bottom:14px}
.tam-refs{font-size:11px;color:var(--muted)}
.tam-refs li{list-style:none;padding:2px 0;border-top:1px solid var(--rail);padding-top:4px;margin-top:2px}
.competitors-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:32px;max-width:1200px;margin-left:auto;margin-right:auto}
.comp-card{background:var(--hull);border:1px solid var(--rail);border-radius:var(--r);padding:18px}
.comp-name{font-size:14px;font-weight:600;color:var(--bright);margin-bottom:6px}
.comp-type{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px}
.comp-pro{font-size:12px;color:var(--ghost);margin-bottom:8px;line-height:1.5}
.comp-gap{font-size:12px;color:var(--signal);line-height:1.5}
.comp-gap::before{content:'✦ ';opacity:.6}

/* ── Roadmap ── */
#roadmap{padding:80px 64px;max-width:1200px;margin:0 auto}
.road-track{position:relative;margin-top:50px}
.road-line{position:absolute;top:24px;left:0;right:0;height:1px;background:var(--rail);z-index:0}
.road-phases{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;position:relative;z-index:1}
.road-phase{text-align:center}
.road-circle{width:48px;height:48px;border-radius:50%;border:2px solid var(--rail);background:var(--void);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;transition:border-color .2s}
.road-circle.done{border-color:var(--signal);color:var(--signal)}
.road-circle.now{border-color:var(--amber);color:var(--amber);box-shadow:0 0 0 4px rgba(245,166,35,.12)}
.road-phase-title{font-size:13px;font-weight:600;color:var(--bright);margin-bottom:8px}
.road-items{text-align:left;font-size:11px;color:var(--ghost);line-height:1.6}
.road-item{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.road-item.done-item{color:var(--signal);opacity:.7}
.road-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:8px}

/* ── VC gates ── */
#vc{padding:80px 64px;background:var(--deep)}
.gates-inner{max-width:1200px;margin:0 auto}
.gates-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:40px}
.gate-node{background:var(--hull);border:1px solid var(--rail);border-radius:var(--r);padding:14px 10px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.gate-node:hover{border-color:var(--signal);background:rgba(0,201,176,.04)}
.gate-node.gate-done{border-color:var(--signal)}
.gate-node.gate-now{border-color:var(--amber)}
.gate-num{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:5px;letter-spacing:1px}
.gate-name{font-size:11px;font-weight:600;color:var(--bright);margin-bottom:6px;line-height:1.4}
.gate-badge{font-size:9px;font-family:'Space Mono',monospace;padding:2px 7px;border-radius:2px;letter-spacing:.5px}
.gb-done{background:rgba(0,201,176,.1);color:var(--signal)}
.gb-now{background:rgba(245,166,35,.1);color:var(--amber)}
.gb-next{background:rgba(255,255,255,.05);color:var(--muted)}
.gate-detail{background:var(--hull);border:1px solid var(--rail);border-radius:12px;padding:24px;margin-top:16px;min-height:160px}
.gate-detail-title{font-size:16px;font-weight:600;color:var(--bright);margin-bottom:16px}
.gate-cols{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.gate-col-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.gate-req{font-size:12px;color:var(--ghost);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.5;display:flex;gap:8px}
.gate-req::before{content:'→';color:var(--signal);flex-shrink:0}
.gate-blocker{grid-column:1/-1;background:rgba(255,101,53,.06);border:1px solid rgba(255,101,53,.2);border-radius:6px;padding:12px;font-size:12px;color:var(--warn);margin-top:8px;line-height:1.5}

/* ── Funding ── */
#funding{padding:80px 64px;max-width:1200px;margin:0 auto}
.funding-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:40px}
.funding-card{background:var(--hull);border:1px solid var(--rail);border-radius:12px;padding:24px}
.funding-title{font-size:15px;font-weight:600;color:var(--bright);margin-bottom:6px}
.funding-sub{font-size:12px;color:var(--ghost);margin-bottom:16px;line-height:1.6}
.funding-item{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
.funding-item:last-child{border-bottom:none}
.fi-label{color:var(--ghost)}
.fi-val{font-family:'Space Mono',monospace;color:var(--bright)}
.fi-val.good{color:var(--signal)}
.fi-val.warn{color:var(--amber)}
.caution-box{background:rgba(245,166,35,.04);border:1px solid rgba(245,166,35,.12);border-radius:var(--r);padding:16px;margin-top:16px}
.caution-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--amber);margin-bottom:8px}
.caution-item{font-size:12px;color:var(--ghost);line-height:1.6;padding:3px 0;display:flex;gap:8px}
.caution-item::before{content:'!';color:var(--amber);flex-shrink:0;font-weight:700}

/* ── Reading list ── */
#reading{padding:80px 64px;background:var(--deep)}
.reading-inner{max-width:1200px;margin:0 auto}
.reading-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:40px}
.reading-card{background:var(--hull);border:1px solid var(--rail);border-radius:var(--r);padding:18px}
.reading-cat{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--signal);text-transform:uppercase;margin-bottom:10px}
.reading-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;line-height:1.5}
.reading-item:last-child{border-bottom:none;padding-bottom:0}
.reading-num{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;min-width:18px}
.reading-text{color:var(--ghost)}
.reading-text a{color:var(--signal);text-decoration:none}
.reading-text a:hover{text-decoration:underline}

/* ── Kill criteria ── */
#kill{padding:40px 64px 80px;max-width:1200px;margin:0 auto}
.kill-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}
.kill-item{background:rgba(255,101,53,.04);border:1px solid rgba(255,101,53,.15);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--ghost);line-height:1.6;display:flex;gap:12px}
.kill-x{color:var(--warn);font-family:'Space Mono',monospace;font-size:14px;font-weight:700;flex-shrink:0;margin-top:1px}

/* ── Footer ── */
footer{padding:40px 64px;background:var(--void);border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between}
.footer-logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--signal);letter-spacing:3px}
.footer-note{font-size:11px;color:var(--muted);text-align:center;max-width:480px}
.footer-links{display:flex;gap:16px}
.footer-links a{font-size:12px;color:var(--muted);text-decoration:none}
.footer-links a:hover{color:var(--signal)}

/* ── Responsive ── */
@media(max-width:900px){
  .hero-grid,.demo-grid,.tech-grid,.funding-grid{grid-template-columns:1fr}
  .steps-grid,.tam-row,.gates-grid{grid-template-columns:1fr 1fr}
  .reading-grid,.competitors-grid,.road-phases{grid-template-columns:1fr 1fr}
  #hero,.demo-grid{padding:80px 24px 60px}
  #map-section,#how,#demo,#tech,#market,#roadmap,#vc,#funding,#reading,#kill{padding:60px 24px}
  .gate-cols{grid-template-columns:1fr}
  nav{padding:0 16px}
  .nav-links{display:none}
}
</style>
</head>
<body>
